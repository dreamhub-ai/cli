name: Bug Report
description: Report a bug in the DreamHub CLI
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the information below so we can investigate.

  - type: input
    id: version
    attributes:
      label: CLI Version
      description: "Run `dh --version` and paste the output."
      placeholder: "dh 0.1.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      description: "e.g., macOS 14.3, Ubuntu 22.04, Windows 11"
      placeholder: "macOS 14.3"
    validations:
      required: true

  - type: input
    id: shell
    attributes:
      label: Shell
      description: "e.g., zsh 5.9, bash 5.2, PowerShell 7.4"
      placeholder: "zsh 5.9"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Run `dh ...`
        2. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: false

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include any error output.
    validations:
      required: false
